<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .logo { font-size: 28px; }
    .title {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #4A90D9, #6C2BD9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-dot.connected { background: #2ECC71; }
    .status-dot.disconnected { background: #E74C3C; }
    .status-dot.recording { background: #F39C12; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4A90D9, #6C2BD9);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 10px;
    }
    .btn-primary:hover { opacity: 0.8; }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-danger {
      background: linear-gradient(135deg, #E74C3C, #C0392B);
    }
    .scores-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 16px 0;
    }
    .score-item {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .score-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
    }
    .score-value {
      font-size: 20px;
      font-weight: 700;
      margin-top: 2px;
    }
    .footer {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .footer a {
      color: #4A90D9;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">👁️</span>
    <span class="title">PARAGON IRIS</span>
  </div>
  
  <div class="status-bar">
    <span class="status-dot disconnected" id="status-dot"></span>
    <span id="status-text">Disconnected</span>
  </div>
  
  <button class="btn-primary" id="start-btn">🎯 Start Analysis</button>
  <button class="btn-primary btn-danger" id="stop-btn" disabled style="display:none;">⏹ Stop Analysis</button>
  
  <div class="scores-preview">
    <div class="score-item">
      <div class="score-label">Eye Contact</div>
      <div class="score-value" id="preview-eye" style="color: #888;">--</div>
    </div>
    <div class="score-item">
      <div class="score-label">Posture</div>
      <div class="score-value" id="preview-posture" style="color: #888;">--</div>
    </div>
    <div class="score-item" style="grid-column: span 2;">
      <div class="score-label">Overall Presence</div>
      <div class="score-value" id="preview-overall" style="color: #888;">--</div>
    </div>
  </div>
  
  <div class="footer">
    <a href="somethingparagon.onrender.com" target="_blank">YOUR_USERNAME.pythonanywhere.com</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
